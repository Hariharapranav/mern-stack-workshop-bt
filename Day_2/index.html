<!DOCTYPE html>
<html>
 <head>
   <title>CSS Day2</title>
<!--- Internal CSS --->
   <style> 
      *{
        margin:0; 
        padding:0;
       }
       body{
         background-color:lightblue;
       }
      
     .box1{
        background: red;
        color: blue;
        text-align: center;
        padding:20px;
        border: 5px solid black;
        margin:2px;
        width:100px;
        height:100px;
      } 

      p{
       background-color:green;
       color:white;
       text-align:right;
       }
   </style>
  
 </head>
 <body>
    <!--- Block Element --->
    <div class="box1">  <!--- Container creation --->
    <h3>Inside div1</h3>
    </div>

    <!--- Inline CSS  -->
    <p style="color:red; text-align:center">Hello, CSS Styling</p><br>
    
<!-- Element Selector -->
  <p>Element Selector Styling</p>
 </body>
</html>
