<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        .parent {
            width: 300px;
            height: 200px;
            border: 2px solid black;
            position: relative;
            top: 100px;
            left: 200px;
        }

        .child {
            background-color: red;
            color: white;
            padding: 10px;

            position: absolute;
            top: 10px;
            right: 10px;
        }
    </style>
</head>

<body>

    <div class="parent">

        Product Card

        <div class="child">
            SALE
        </div>

    </div>

</body>

</html>
