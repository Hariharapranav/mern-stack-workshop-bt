<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulb</title>
    <script src="script.js" defer></script>
</head>
<body>
    <div>
        <img src="OFFbulb.png" id="my-image" alt="Bulb" width="200px" height="200px">
